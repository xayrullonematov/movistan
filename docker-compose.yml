services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    volumes:
      - app-data:/app/data
      - app-exports:/app/.movistan/exports
    environment:
      - DATABASE_URL=file:./data/production.db
      - HOSTNAME=0.0.0.0

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  app-data:
  app-exports:
